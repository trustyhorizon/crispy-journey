<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work in Progress | Coming Soon</title>
    <style>
        :root {
            --primary-color: #2d3436;
            --accent-color: #0984e3;
            --bg-color: #f9f9f9;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--primary-color);
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: #fff;
            padding: 8px 16px;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 2rem;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #636e72;
            margin-bottom: 2rem;
        }

        .footer-link {
            text-decoration: none;
            color: var(--accent-color);
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .footer-link:hover {
            opacity: 0.7;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(9, 132, 227, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(9, 132, 227, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(9, 132, 227, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="status-badge">
            <span class="dot"></span>
            Currently in Development
        </div>
        <h1>Something great is <br>in the works.</h1>
        <p>I am currently refining the final details. I'm building a better experience for you and can't wait to share it soon.</p>
        
        <div class="links">
            <a href="mailto:contact@superblox.app" class="footer-link">Contact Me</a>
        </div>
    </div>

</body>
</html>
